<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流枢纽 | 实时监控终端</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        /* ========== 全局与卡片样式 (保持原有暗黑科技风) ========== */
        :root {
            --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #10b981; --danger: #ef4444; 
            --text-main: #f8fafc; --text-sub: #94a3b8;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 70%);
            color: var(--text-main); margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .dashboard {
            background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 40px 30px; width: 100%; max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; overflow: hidden;
        }
        .dashboard::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; }

        /* ========== 数据显示区 ========== */
        .data-panel { text-align: center; margin-bottom: 30px; }
        .data-label { font-size: 0.9rem; color: var(--text-sub); letter-spacing: 1px; margin-bottom: 10px; }
        .count-display {
            font-size: 5rem; font-weight: 800; color: var(--primary);
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); line-height: 1; margin: 10px 0; font-variant-numeric: tabular-nums;
        }

        /* ========== 远程控制台 (新增) ========== */
        .control-panel {
            background: rgba(0, 0, 0, 0.3); padding: 20px; border-radius: 12px; margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-group { display: flex; gap: 15px; margin-top: 15px; }
        .btn {
            flex: 1; padding: 12px 0; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s ease; color: white; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-start { background-color: rgba(16, 185, 129, 0.2); border: 1px solid var(--primary); color: var(--primary); }
        .btn-start:hover { background-color: var(--primary); color: white; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .btn-stop { background-color: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: var(--danger); }
        .btn-stop:hover { background-color: var(--danger); color: white; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        /* ========== 状态指示区 ========== */
        .status-container {
            display: flex; justify-content: space-between; background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px; border-radius: 12px; font-size: 0.9rem;
        }
        .status-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background-color: var(--danger); }
        .dot.active { background-color: var(--primary); box-shadow: 0 0 10px var(--primary); animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .footer { margin-top: 20px; text-align: center; font-size: 0.8rem; color: var(--text-sub); }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header"><h1>⚡ STM32 物流集散中枢</h1></div>
        
        <div class="data-panel">
            <div class="data-label">今日实时包裹计数 (件)</div>
            <div class="count-display" id="package-count">--</div>
        </div>

        <div class="control-panel">
            <div class="data-label" style="margin-bottom: 0;">远程设备控制</div>
            <div class="btn-group">
                <button class="btn btn-start" onclick="sendCommand('start')">▶ 启动流水线</button>
                <button class="btn btn-stop" onclick="sendCommand('stop')">⏹ 紧急停止</button>
            </div>
        </div>

        <div class="status-container">
            <div class="status-item">
                <div class="dot" id="network-dot"></div><span id="network-text">连接中...</span>
            </div>
            <div class="status-item">
                <span style="color: var(--text-sub);">状态:</span>
                <span id="system-status" style="color: var(--danger); font-weight: bold;">等待同步</span>
            </div>
        </div>
        <div class="footer">最后更新: <span id="last-update">--:--:--</span></div>
    </div>

    <script>
        const brokerUrl = 'wss://o61000fd.ala.cn-hangzhou.emqxsl.cn:8084/mqtt';
        const options = {
            clean: true, connectTimeout: 4000,
            clientId: 'Web-UI-' + Math.random().toString(16).substr(2, 8),
            username: 'esp01s', password: '123456',
        };

        const client = mqtt.connect(brokerUrl, options);
        
        const elCount = document.getElementById('package-count');
        const elNetworkDot = document.getElementById('network-dot');
        const elNetworkText = document.getElementById('network-text');
        const elSystemStatus = document.getElementById('system-status');
        const elLastUpdate = document.getElementById('last-update');

        client.on('connect', function () {
            elNetworkDot.classList.add('active');
            elNetworkText.innerText = '云端已连接';
            elNetworkText.style.color = 'var(--primary)';
            // 订阅接收数据的频道
            client.subscribe('logistics/data');
        });

        client.on('message', function (topic, message) {
            try {
                const data = JSON.parse(message.toString());
                elCount.innerText = data.count;
                if(data.status === 'running') {
                    elSystemStatus.innerText = '正在运行'; elSystemStatus.style.color = 'var(--primary)';
                } else {
                    elSystemStatus.innerText = '已停止'; elSystemStatus.style.color = 'var(--danger)';
                }
                elLastUpdate.innerText = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            } catch (e) { console.error(e); }
        });

        client.on('offline', function () {
            elNetworkDot.classList.remove('active');
            elNetworkText.innerText = '已断开'; elNetworkText.style.color = 'var(--danger)';
        });

        // ========== 新增：发送控制指令函数 ==========
        function sendCommand(action) {
            if (!client.connected) {
                alert("网络未连接，无法发送指令！");
                return;
            }
            
            // 组装要发送的 JSON 指令包
            const payload = JSON.stringify({ cmd: action });
            
            // 发布到 logistics/cmd 频道
            client.publish('logistics/cmd', payload);
            console.log("已下发控制指令:", payload);
            
            // 给按钮加点简单的点击反馈
            if(action === 'start') {
                elSystemStatus.innerText = '指令下发: 启动...';
                elSystemStatus.style.color = '#f59e0b'; // 变黄提示正在发送
            } else {
                elSystemStatus.innerText = '指令下发: 停止...';
                elSystemStatus.style.color = '#f59e0b';
            }
        }
    </script>
</body>
</html>

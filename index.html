<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流监控大屏 | 极速版</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --bg: #0f172a; --main: #10b981; --warn: #ef4444; --txt: #f8fafc; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; min-height: 100vh; box-sizing: border-box; }
        .wrapper { display: flex; flex-direction: column; gap: 20px; height: 95vh; }
        .panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-top: 4px solid var(--main); }
        .main { display: flex; flex: 1; gap: 20px; }
        .data-box { flex: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .ctrl-box { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
        .count { font-size: 8rem; font-weight: 800; color: var(--main); text-shadow: 0 0 30px rgba(16,185,129,0.3); margin: 20px 0; }
        .btn { padding: 20px; border: none; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-on { background: rgba(16,185,129,0.2); border: 1px solid var(--main); color: var(--main); }
        .btn-on:hover { background: var(--main); color: white; }
        .btn-off { background: rgba(239,68,68,0.2); border: 1px solid var(--warn); color: var(--warn); }
        .btn-off:hover { background: var(--warn); color: white; }
        .footer { display: flex; justify-content: space-between; font-size: 0.9rem; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: grey; display: inline-block; margin-right: 5px; }
        .active { background: var(--main); box-shadow: 0 0 10px var(--main); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @media (max-width: 768px) { .main { flex-direction: column; } .count { font-size: 4rem; } }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="panel header">
            <h2 style="margin:0">📦 物流数据中枢 (极速版)</h2>
            <div id="time">--:--:--</div>
        </div>
        <div class="main">
            <div class="panel data-box">
                <div style="color:#94a3b8">今日累计计件</div>
                <div class="count" id="count">--</div>
            </div>
            <div class="panel ctrl-box">
                <button class="btn btn-on" onclick="send('start')">▶ 开启流水线</button>
                <button class="btn btn-off" onclick="send('stop')">⏹ 紧急停机</button>
            </div>
        </div>
        <div class="panel footer">
            <div><span class="dot" id="dot"></span><span id="stat">云端连接中...</span></div>
            <div>系统状态: <span id="sys">未知</span></div>
        </div>
    </div>

    <script>
        const broker = 'wss://broker.emqx.io:8084/mqtt';
        const topic_data = 'logistics/data/yxz_888';
        const topic_cmd = 'logistics/cmd/yxz_888';
        
        const client = mqtt.connect(broker, { clientId: 'web_' + Math.random().toString(16).substr(2, 8) });

        client.on('connect', () => {
            document.getElementById('dot').className = 'dot active';
            document.getElementById('stat').innerText = '云端已就绪';
            client.subscribe(topic_data);
        });

        client.on('message', (t, m) => {
            const d = JSON.parse(m.toString());
            document.getElementById('count').innerText = d.count;
            document.getElementById('sys').innerText = (d.status==='running'?'运行中':'停止');
            document.getElementById('sys').style.color = (d.status==='running'?'#10b981':'#ef4444');
            document.getElementById('time').innerText = new Date().toLocaleTimeString();
        });

        function send(cmd) {
            client.publish(topic_cmd, JSON.stringify({cmd: cmd}));
            document.getElementById('sys').innerText = '指令已下发...';
        }
    </script>
</body>
</html>

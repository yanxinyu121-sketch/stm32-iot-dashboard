<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流包裹实时监控系统</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    
    <style>
        /* ========== 自适应 UI 样式 ========== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .dashboard-card {
            background-color: white;
            /* 电脑端最大宽度 500px，手机端自动占满屏幕 100% */
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 { color: #1f2937; font-size: 1.5rem; }
        .data-box {
            margin: 20px 0;
            padding: 20px;
            background-color: #ecfdf5;
            border-radius: 10px;
            border: 1px solid #10b981;
        }
        .count-value {
            font-size: 3rem;
            font-weight: bold;
            color: #059669;
            margin: 10px 0;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background-color: #3b82f6;
            color: white;
            font-size: 0.9rem;
        }
        #connection-status {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h1>📦 物流包裹计数系统</h1>
        
        <div class="data-box">
            <div style="color: #6b7280;">今日已扫描包裹总数</div>
            <div class="count-value" id="package-count">等待数据...</div>
            <div class="status-badge" id="system-status">流水线状态: 未知</div>
        </div>

        <div id="connection-status">🟡 正在连接云服务器...</div>
    </div>

    <script>
        // ========== MQTT 连接配置 ==========
        // 注意：网页端必须使用 wss (WebSocket Secure) 协议和 8084 端口
        const brokerUrl = 'wss://o61000fd.ala.cn-hangzhou.emqxsl.cn:8084/mqtt';
        
        const options = {
            clean: true,
            connectTimeout: 4000,
            clientId: 'Web-Dashboard-' + Math.random().toString(16).substr(2, 8),
            // 暂时使用你之前的账号密码，正式项目建议在 EMQX 里新建一个网页专用账号
            username: 'esp01s',
            password: '123456',
        };

        const client = mqtt.connect(brokerUrl, options);

        // ========== 事件处理 ==========
        client.on('connect', function () {
            document.getElementById('connection-status').innerHTML = '🟢 实时数据通道已连接';
            // 订阅与 ESP-01S 相同的频道
            client.subscribe('logistics/data', function (err) {
                if (!err) {
                    console.log('成功订阅 logistics/data 主题');
                }
            });
        });

        // 当收到 ESP-01S 发来的数据时触发
        client.on('message', function (topic, message) {
            // 将接收到的文本数据转换回 JSON 格式
            const data = JSON.parse(message.toString());
            console.log('收到新数据:', data);

            // 更新网页上的数字和状态
            document.getElementById('package-count').innerText = data.count;
            
            if(data.status === 'running') {
                document.getElementById('system-status').innerText = '流水线状态: 运行中';
                document.getElementById('system-status').style.backgroundColor = '#10b981'; // 绿色
            }
        });

        client.on('error', function (error) {
            document.getElementById('connection-status').innerHTML = '🔴 连接断开，请检查网络';
            console.error('连接失败:', error);
        });
    </script>
</body>
</html>

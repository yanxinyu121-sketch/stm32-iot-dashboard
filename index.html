<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流枢纽 | 全屏监控大屏</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        /* ========== 全局暗黑科技风 ========== */
        :root {
            --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.6);
            --primary: #10b981; --danger: #ef4444; 
            --text-main: #f8fafc; --text-sub: #94a3b8;
        }
        
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%);
            color: var(--text-main); margin: 0; min-height: 100vh;
            /* 使用视口单位(vh/vw)撑满屏幕，留出呼吸边距 */
            padding: 3vh 3vw; box-sizing: border-box;
        }

        /* 整个大屏的容器 */
        .dashboard-wrapper {
            display: flex; flex-direction: column; gap: 20px;
            height: 100%; min-height: 90vh;
        }

        /* 统一的玻璃拟态面板样式 */
        .panel {
            background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* ========== 顶部标题栏 ========== */
        .header-panel {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; border-top: 4px solid var(--primary);
        }
        .header-panel h1 { margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        .time-display { color: var(--text-sub); font-size: 1.1rem; }

        /* ========== 中间主内容区 (左右分栏) ========== */
        .main-content {
            display: flex; flex: 1; gap: 20px;
        }
        
        /* 左侧数据大屏 (占 2 份宽度) */
        .panel-data {
            flex: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px;
        }
        .data-label { font-size: 1.2rem; color: var(--text-sub); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
        .count-display {
            font-size: 10rem; /* 电脑端极大的字体 */
            font-weight: 800; color: var(--primary);
            text-shadow: 0 0 40px rgba(16, 185, 129, 0.3); margin: 0; line-height: 1; font-variant-numeric: tabular-nums;
        }

        /* 右侧控制面板 (占 1 份宽度) */
        .panel-control {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px;
        }
        .btn-group { display: flex; flex-direction: column; gap: 25px; width: 100%; max-width: 300px; }
        .btn {
            width: 100%; padding: 20px 0; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; letter-spacing: 1px;
            cursor: pointer; transition: all 0.3s ease; color: white; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-start { background-color: rgba(16, 185, 129, 0.15); border: 1px solid var(--primary); color: var(--primary); }
        .btn-start:hover { background-color: var(--primary); color: white; box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        .btn-stop { background-color: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger); color: var(--danger); }
        .btn-stop:hover { background-color: var(--danger); color: white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }

        /* ========== 底部状态栏 ========== */
        .status-panel {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; font-size: 1.1rem;
        }
        .status-item { display: flex; align-items: center; gap: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background-color: var(--danger); }
        .dot.active { background-color: var(--primary); box-shadow: 0 0 12px var(--primary); animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* =========================================================
           手机端自适应逻辑 (当屏幕宽度小于 768px 时触发以下样式) 
           ========================================================= */
        @media (max-width: 768px) {
            body { padding: 15px; }
            .header-panel { flex-direction: column; gap: 15px; text-align: center; }
            /* 核心：将原本左右排布(row)改成上下堆叠(column) */
            .main-content { flex-direction: column; }
            /* 字体缩小，防止手机端撑爆屏幕 */
            .count-display { font-size: 5rem; }
            .panel-data, .panel-control { padding: 30px 20px; }
            .btn-group { max-width: 100%; }
            .status-panel { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="panel header-panel">
            <h1>⚡ 物流包裹集散监控大屏</h1>
            <div class="time-display">最后同步: <span id="last-update">--:--:--</span></div>
        </header>

        <main class="main-content">
            <section class="panel panel-data">
                <div class="data-label">今日总过线包裹 (件)</div>
                <div class="count-display" id="package-count">--</div>
            </section>

            <section class="panel panel-control">
                <div class="data-label">远程流水线控制</div>
                <div class="btn-group">
                    <button class="btn btn-start" onclick="sendCommand('start')">▶ 启动设备</button>
                    <button class="btn btn-stop" onclick="sendCommand('stop')">⏹ 紧急断电</button>
                </div>
            </section>
        </main>

        <footer class="panel status-panel">
            <div class="status-item">
                <div class="dot" id="network-dot"></div>
                <span id="network-text">云端连接中...</span>
            </div>
            <div class="status-item">
                <span style="color: var(--text-sub);">产线当前状态:</span>
                <span id="system-status" style="color: var(--danger); font-weight: bold; letter-spacing: 1px;">等待同步</span>
            </div>
        </footer>
    </div>

    <script>
        const brokerUrl = 'wss://o61000fd.ala.cn-hangzhou.emqxsl.cn:8084/mqtt';
        const options = {
            clean: true, connectTimeout: 4000,
            clientId: 'Web-UI-' + Math.random().toString(16).substr(2, 8),
            username: 'esp01s', password: '123456',
        };

        const client = mqtt.connect(brokerUrl, options);
        
        const elCount = document.getElementById('package-count');
        const elNetworkDot = document.getElementById('network-dot');
        const elNetworkText = document.getElementById('network-text');
        const elSystemStatus = document.getElementById('system-status');
        const elLastUpdate = document.getElementById('last-update');

        client.on('connect', function () {
            elNetworkDot.classList.add('active');
            elNetworkText.innerText = '云端链路已接通';
            elNetworkText.style.color = 'var(--primary)';
            client.subscribe('logistics/data');
        });

        client.on('message', function (topic, message) {
            try {
                const data = JSON.parse(message.toString());
                elCount.innerText = data.count;
                if(data.status === 'running') {
                    elSystemStatus.innerText = '正在运行'; elSystemStatus.style.color = 'var(--primary)';
                } else {
                    elSystemStatus.innerText = '已停止'; elSystemStatus.style.color = 'var(--danger)';
                }
                elLastUpdate.innerText = new Date().toLocaleTimeString('zh-CN', { hour12: false });
            } catch (e) { console.error(e); }
        });

        client.on('offline', function () {
            elNetworkDot.classList.remove('active');
            elNetworkText.innerText = '连接已断开'; elNetworkText.style.color = 'var(--danger)';
        });

        function sendCommand(action) {
            if (!client.connected) { alert("网络未连接！"); return; }
            const payload = JSON.stringify({ cmd: action });
            client.publish('logistics/cmd', payload);
            
            if(action === 'start') {
                elSystemStatus.innerText = '下发指令: 启动...'; elSystemStatus.style.color = '#f59e0b';
            } else {
                elSystemStatus.innerText = '下发指令: 停止...'; elSystemStatus.style.color = '#f59e0b';
            }
        }
    </script>
</body>
</html><!DOCTYPE html>

</head>
<body>

    <div class="dashboard">
        <div class="header"><h1>⚡ STM32 物流集散中枢</h1></div>
        
        <div class="data-panel">
            <div class="data-label">今日实时包裹计数 (件)</div>
            <div class="count-display" id="package-count">--</div>
        </div>

        <div class="control-panel">
            <div class="data-label" style="margin-bottom: 0;">远程设备控制</div>
            <div class="btn-group">
                <button class="btn btn-start" onclick="sendCommand('start')">▶ 启动流水线</button>
                <button class="btn btn-stop" onclick="sendCommand('stop')">⏹ 紧急停止</button>
            </div>
        </div>

        <div class="status-container">
            <div class="status-item">
                <div class="dot" id="network-dot"></div><span id="network-text">连接中...</span>
            </div>
            <div class="status-item">
                <span style="color: var(--text-sub);">状态:</span>
                <span id="system-status" style="color: var(--danger); font-weight: bold;">等待同步</span>
            </div>
        </div>
        <div class="footer">最后更新: <span id="last-update">--:--:--</span></div>
    </div>

    <script>
        const brokerUrl = 'wss://o61000fd.ala.cn-hangzhou.emqxsl.cn:8084/mqtt';

            clean: true, connectTimeout: 4000,
            clientId: 'Web-UI-' + Math.random().toString(16).substr(2, 8),
            username: 'esp01s', password: '123456',
        };

        const client = mqtt.connect(brokerUrl, options);
        
        const elCount = document.getElementById('package-count');
        const elNetworkDot = document.getElementById('network-dot');
        const elNetworkText = document.getElementById('network-text');
        const elSystemStatus = document.getElementById('system-status');
        const elLastUpdate = document.getElementById('last-update');

        client.on('connect', function () {
            elNetworkDot.classList.add('active');
            elNetworkText.innerText = '云端已连接';
            elNetworkText.style.color = 'var(--primary)';
            // 订阅接收数据的频道
            client.subscribe('logistics/data');
        });

        client.on('message', function (topic, message) {
            try {
                const data = JSON.parse(message.toString());
                elCount.innerText = data.count;
                if(data.status === 'running') {
                    elSystemStatus.innerText = '正在运行'; elSystemStatus.style.color = 'var(--primary)';

                    elSystemStatus.innerText = '已停止'; elSystemStatus.style.color = 'var(--danger)';
                }

            elNetworkText.innerText = '已断开'; elNetworkText.style.color = 'var(--danger)';

            if (!client.connected) {
                alert("网络未连接，无法发送指令！");
                return;
            }
            
            // 组装要发送的 JSON 指令包
            const payload = JSON.stringify({ cmd: action });
            
            // 发布到 logistics/cmd 频道
            client.publish('logistics/cmd', payload);
            console.log("已下发控制指令:", payload);

                elSystemStatus.innerText = '指令下发: 启动...';

            } else {
                elSystemStatus.innerText = '指令下发: 停止...';
                elSystemStatus.style.color = '#f59e0b';
            }
        }
    </script>
